[workspace.package]
version = "0.1.0"

[package]
name = "tycho-router"
version.workspace = true
edition = "2021"

[[bin]]
name = "tycho-router"
path = "src/main.rs"

[workspace]
members = ["uniswap-x"]

[dependencies]
num-bigint = { workspace = true }
tycho-simulation = { workspace = true }
tycho-execution = { workspace = true }
petgraph = { workspace = true }
tokio = { workspace = true }
futures = { workspace = true }
alloy = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
warp = { workspace = true }
tokio-util = { workspace = true }
hex = { workspace = true }

[workspace.dependencies]
num-bigint = "0.4.6"
tycho-simulation = { git = "https://github.com/propeller-heads/tycho-simulation.git", package = "tycho-simulation", tag = "0.217.1", features = ["evm"] }
tycho-execution = { path = "../tycho-execution" }
petgraph = "0.8.3"
tokio = "1.48.0"
futures = "0.1.31"
alloy = { version = "1.0.30", features = ["providers", "signer-local", "rpc-types-eth"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
warp = "0.3"
tokio-util = "0.7"
hex = "0.4"
